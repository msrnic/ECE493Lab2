<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Conference Management System</title>
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, sans-serif;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(160deg, #eef6ff, #fff9ef);
        color: #102a43;
      }

      main {
        width: min(90vw, 520px);
        background: #fff;
        border: 1px solid #d9e2ec;
        border-radius: 10px;
        padding: 1.5rem;
        box-shadow: 0 12px 32px rgba(16, 42, 67, 0.08);
      }

      h1 {
        margin-top: 0;
      }

      nav {
        display: grid;
        gap: 0.75rem;
      }

      a {
        display: block;
        text-decoration: none;
        text-align: center;
        padding: 0.75rem;
        border-radius: 8px;
        border: 1px solid #bcccdc;
        color: #102a43;
        background: #f8fbff;
      }

      a:hover {
        background: #e6f0ff;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Conference Management System</h1>
      <p>Select an option to continue.</p>
      <nav>
        <a href="/register">Register</a>
        <a href="/login">Login</a>
      </nav>
    </main>
  </body>
</html>
