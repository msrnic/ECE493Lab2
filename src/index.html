<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Conference Management System</title>
    <link rel="stylesheet" href="/assets/css/editor-decision.css" />
    <link rel="stylesheet" href="/assets/css/final-schedule.css" />
  </head>
  <body>
    <main>
      <h1>Conference Management System</h1>
      <p>Choose an action to continue:</p>

      <section class="editor-decision-shell" data-decision-workflow-app>
        <h2>Editor Decision Workflow</h2>
        <p data-decision-status data-state="idle" aria-live="polite"></p>
        <p data-decision-current-state>Current decision: UNDECIDED</p>

        <form data-decision-form>
          <label for="decision-paper-id">Paper ID</label>
          <input id="decision-paper-id" data-decision-paper-id name="paperId" value="PAPER-123" />

          <label for="decision-version">Expected Version</label>
          <input id="decision-version" data-decision-version name="expectedVersion" value="1" />

          <label for="decision-action">Action</label>
          <select id="decision-action" data-decision-action name="action">
            <option value="DEFER">DEFER</option>
            <option value="FINAL">FINAL</option>
          </select>

          <label for="decision-final-outcome">Final Outcome</label>
          <select id="decision-final-outcome" data-decision-final-outcome name="finalOutcome" disabled>
            <option value="">Select outcome</option>
            <option value="ACCEPT">ACCEPT</option>
            <option value="REJECT">REJECT</option>
            <option value="REVISE">REVISE</option>
          </select>

          <button type="submit" data-decision-save>Save decision</button>
        </form>

        <a data-decision-override-link hidden href="#">Open override workflow</a>
        <section data-decision-evaluations></section>
      </section>

      <section class="schedule-shell" id="final-schedule">
        <h2>Final Schedule</h2>
        <div data-final-schedule-root></div>
      </section>
    </main>

    <script type="module">
      import { bootstrapDecisionWorkflowPage } from '/assets/js/decision-workflow-page.js';
      import { registerFinalScheduleOnLoad } from '/assets/js/app.js';

      bootstrapDecisionWorkflowPage();
      registerFinalScheduleOnLoad();
    </script>
  </body>
</html>
